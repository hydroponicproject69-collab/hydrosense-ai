<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HydroSense AI • The Future of Farming</title>
  
  <!-- Favicon & PWA -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="index_style.css">
</head>
<body>
  
  <!-- "Click to start" Overlay (Bypasses browser autoplay audio limits) -->
  <div id="begin-overlay">
    <i class="fas fa-leaf" id="overlay-leaf-icon"></i>
    <button class="begin-btn" id="start-btn">Enter the Ecosystem</button>
  </div>

  <div class="bg-transition" id="bg-gradient"></div>
  
  <div id="particles-js"></div>

  <div class="scene-container">
    
    <!-- Act 2: Floating Data Elements -->
    <div class="data-orbit-container" id="orbit-container">
      <div class="data-card" id="card-ph">
        <h4>pH Level</h4>
        <p>5.8</p>
      </div>
      <div class="data-card" id="card-tds">
        <h4>TDS</h4>
        <p>850 ppm</p>
      </div>
      <div class="data-card" id="card-temp">
        <h4>Air Temp</h4>
        <p>24.5 °C</p>
      </div>
      <div class="data-card" id="card-hum">
        <h4>Humidity</h4>
        <p>65%</p>
      </div>
    </div>

    <!-- Act 3: Tree Morph/Growth SVG -->
    <div id="tree-container">
      <svg class="tree-svg" id="treeSvg" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
        <!-- Roots / Trunk -->
        <path class="tree-path trunk" d="M100 300 Q100 250 100 200" />
        <path class="tree-path trunk" d="M90 300 Q100 280 100 200" />
        <path class="tree-path trunk" d="M110 300 Q100 280 100 200" />
        
        <!-- Branches -->
        <path class="tree-path branch branch-1" d="M100 200 Q70 150 40 120" />
        <path class="tree-path branch branch-2" d="M100 200 Q130 150 160 120" />
        <path class="tree-path branch branch-3" d="M100 170 Q80 100 100 50" />
        <path class="tree-path branch branch-4" d="M85 130 Q50 90 20 80" />
        <path class="tree-path branch branch-5" d="M115 130 Q150 90 180 80" />
        
        <!-- Leaves -->
        <circle class="tree-leaf" cx="40" cy="120" r="8" />
        <circle class="tree-leaf" cx="160" cy="120" r="8" />
        <circle class="tree-leaf" cx="100" cy="50" r="10" />
        <circle class="tree-leaf" cx="20" cy="80" r="6" />
        <circle class="tree-leaf" cx="180" cy="80" r="6" />
        <circle class="tree-leaf" cx="60" cy="135" r="5" />
        <circle class="tree-leaf" cx="140" cy="135" r="5" />
      </svg>
    </div>

    <!-- Act 4 & 5: Typography -->
    <div class="brand-reveal">
      <h1 class="brand-title" id="titleText">HydroSense AI</h1>
      <p class="brand-subtitle" id="subtitleText">Smart Hydroponics. Intelligent Growth.</p>
    </div>
    
    <div class="welcome-msg" id="welcomeText"></div>

    <!-- Act 6: CTA Transition -->
    <div class="cta-container" id="cta-btn">
      <button class="btn-get-started" onclick="transitionToAuth()">
        Get Started <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
      </button>
    </div>

  </div>

  <button class="skip-btn" onclick="transitionToAuth()">Skip Intro</button>

  <!-- Developer Credit -->
  <div class="dev-footer">
    Developed by <span class="team-name">Team Green Ops</span>
  </div>


  <!-- Ambient Sound (Deep Cinematic Sci-Fi/Nature) -->
  <audio id="ambient-audio" src="https://assets.mixkit.co/music/preview/mixkit-cinematic-sci-fi-ambient-loop-1178.mp3" loop preload="auto"></audio>

  <!-- GSAP Core & TextPlugin -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
  
  <!-- tsParticles Core -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
  
  <script src="index_anim.js"></script>
</body>
</html>
